name: preview-smoke

# Deploys each PR as a Vercel preview, then runs Playwright smoke tests
# against it. Lint/typecheck job runs in parallel for cheap early
# feedback. The deploy step gracefully no-ops when VERCEL_TOKEN is
# missing so this workflow can land before the token is provisioned.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: eslint
        run: npx eslint . || true
        # eslint warnings shouldn't block PRs yet; flip to drop || true
        # once the codebase is clean.

  preview:
    name: vercel preview deploy
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
      deployed: ${{ steps.deploy.outputs.deployed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check VERCEL_TOKEN
        id: token_check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::warning::VERCEL_TOKEN secret not set — skipping Vercel preview deploy. Add it with: gh secret set VERCEL_TOKEN -b '<token>'"
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.token_check.outputs.has_token == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel preview env
        if: steps.token_check.outputs.has_token == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview
        if: steps.token_check.outputs.has_token == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        id: deploy
        if: steps.token_check.outputs.has_token == 'true'
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          echo "deployed=true" >> "$GITHUB_OUTPUT"
          echo "Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: No-deploy notice
        if: steps.token_check.outputs.has_token != 'true'
        run: |
          echo "deployed=false" >> "$GITHUB_OUTPUT"
          echo "VERCEL_TOKEN not configured; preview deploy skipped." >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: playwright smoke
    runs-on: ubuntu-latest
    needs: preview
    if: needs.preview.outputs.deployed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        env:
          PREVIEW_URL: ${{ needs.preview.outputs.preview_url }}
          TEST_LOBBYCAT_PASSWORD: ${{ secrets.TEST_LOBBYCAT_PASSWORD }}
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  smoke-skipped:
    name: playwright smoke (skipped)
    runs-on: ubuntu-latest
    needs: preview
    if: needs.preview.outputs.deployed != 'true'
    steps:
      - run: |
          echo "Smoke tests skipped because no preview deploy was produced."
          echo "Add VERCEL_TOKEN as a repo secret to enable preview deploys and smoke gating."
